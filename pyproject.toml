[project]
name = "checkup"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [{ name = "Jan Vanbuel", email = "jan.vanbuel@ond.vlaanderen.be" }]
requires-python = ">=3.12"
dependencies = ["pydantic>=2.11.7", "pyyaml>=6.0", "rich>=13.0"]

[project.scripts]
checkup = "checkup:main"

[build-system]
requires = ["uv_build>=0.8.13,<0.9.0"]
build-backend = "uv_build"

[tool.uv.workspace]
members = [
    "plugins/checkup-git",
    "plugins/checkup-dbt",
    "plugins/checkup-python",
    "plugins/checkup-conveyor",
]

[dependency-groups]
dev = ["pytest>=9.0.2", "pytest-cov>=7.0.0"]
